name: Deploy API Docs

# Generates TypeDoc API documentation and deploys to a dedicated `gh-pages` branch.
# The branch contains ONLY the generated docs — no source code.
# GitHub Pages serves from `gh-pages` branch root (`/`).
#
# Triggers:
# - Automatically when a GitHub Release is published
# - Manually via workflow_dispatch

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  deploy-docs:
    name: Build & Deploy TypeDoc
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to push generated docs to gh-pages branch
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate API docs
        run: npx typedoc

      # Prevent GitHub Pages from running Jekyll on the gh-pages branch
      - name: Add .nojekyll
        run: touch docs/api/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/api
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "docs: update API documentation from ${{ github.ref_name }}"
